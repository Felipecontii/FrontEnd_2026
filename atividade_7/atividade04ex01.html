<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Validador de CPF</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
    }

    .valido {
      color: green;
    }

    .invalido {
      color: red;
    }
  </style>
</head>
<body>

  <h2>Validador de CPF</h2>

  <input type="text" id="cpf" placeholder="Digite o CPF">
  <button onclick="validarCPF()">Validar</button>

  <p id="resultado"></p>

  <script>

    function validarCPF() {

      let cpf = document.getElementById("cpf").value;

      cpf = cpf.replace(/\D/g, "");

      let resultado = document.getElementById("resultado");

      if (cpf.length != 11) {
        resultado.innerHTML = "CPF Inválido";
        resultado.className = "invalido";
        return;
      }

      let soma = 0;

      for (let i = 0; i < 9; i++) {
        soma += cpf[i] * (10 - i);
      }

      let digito1 = (soma * 10) % 11;

      if (digito1 == 10) {
        digito1 = 0;
      }
      soma = 0;

      for (let i = 0; i < 10; i++) {
        soma += cpf[i] * (11 - i);
      }

      let digito2 = (soma * 10) % 11;

      if (digito2 == 10) {
        digito2 = 0;
      }

      if (digito1 == cpf[9] && digito2 == cpf[10]) {
        resultado.innerHTML = "CPF Válido";
        resultado.className = "valido";
      } else {
        resultado.innerHTML = "CPF Inválido";
        resultado.className = "invalido";
      }

    }

  </script>

</body>
</html>
