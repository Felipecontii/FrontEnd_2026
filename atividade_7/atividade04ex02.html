<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Conversor</title>
</head>
<body>

  <h2>Conversor de Temperatura</h2>

  <label>Celsius:</label>
  <input type="number" id="celsius" step="0.1">

  <br><br>

  <label>Fahrenheit:</label>
  <input type="number" id="fahrenheit" step="0.1">

  <script>
    let celsius = document.getElementById("celsius");
    let fahrenheit = document.getElementById("fahrenheit");

    celsius.oninput = function () {
      let c = parseFloat(celsius.value);

      if (!isNaN(c)) {
        fahrenheit.value = ((c * 9/5) + 32).toFixed(2);
      } else {
        fahrenheit.value = "";
      }
    };

    fahrenheit.oninput = function () {
      let f = parseFloat(fahrenheit.value);

      if (!isNaN(f)) {
        celsius.value = ((f - 32) * 5/9).toFixed(2);
      } else {
        celsius.value = "";
      }
    };
  </script>

</body>
</html>
