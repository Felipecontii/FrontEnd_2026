<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista de Convidados VIP</title>

  <style>
    body{
      font-family: Arial;
      background-color: #f0f0f0;
    }

    .card{
      width: 300px;
      margin: 50px auto;
      background-color: white;
      padding: 20px;
      border: 1px solid #ccc;
    }

    input{
      padding: 5px;
    }

    button{
      padding: 5px;
      cursor: pointer;
    }

    li{
      margin-top: 10px;
      border-bottom: 1px solid #ddd;
      padding-bottom: 5px;
    }

    .riscado{
      text-decoration: line-through;
    }
  </style>
</head>
<body>

  <div class="card">
    <h2>Convidados VIP</h2>

    <input type="text" id="nome" placeholder="Digite o nome">
    <button onclick="adicionar()">Adicionar</button>

    <ul id="lista"></ul>
  </div>

  <script>

    let convidados = [];

    function adicionar(){

      let input = document.getElementById("nome");
      let nome = input.value.trim();

      if(nome == ""){
        alert("Digite um nome");
        return;
      }

      convidados.push(nome);

      mostrarLista();

      input.value = "";
    }

    function mostrarLista(){

      let lista = document.getElementById("lista");

      lista.innerHTML = "";

      convidados.forEach((convidado, index) => {

        lista.innerHTML += `
          <li>
            <span id="nome-${index}">${convidado}</span>

            <button onclick="concluir(${index})">
              Concluir
            </button>

            <button onclick="editar(${index})">
              Editar
            </button>

            <button onclick="excluir(${index})">
              Excluir
            </button>
          </li>
        `;
      });
    }

    function concluir(index){

      let nome = document.getElementById(`nome-${index}`);

      nome.classList.toggle("riscado");
    }

    function editar(index){

      let novoNome = prompt("Novo nome:");

      if(novoNome != null && novoNome.trim() != ""){
        convidados[index] = novoNome;

        mostrarLista();
      }
    }

    function excluir(index){

      convidados.splice(index, 1);

      mostrarLista();
    }

  </script>

</body>
</html>
