<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crédito para Festas</title>

  <style>

    body{
      font-family: Arial;
      background-color: #f0f0f0;
    }

    .card{
      width: 320px;
      margin: 50px auto;
      background-color: white;
      padding: 20px;
      border: 1px solid #ccc;
    }

    select,
    input,
    button{
      width: 100%;
      padding: 8px;
      margin-top: 10px;
    }

    .resultado{
      margin-top: 20px;
    }

  </style>
</head>
<body>

  <div class="card">

    <h2>Orçamento de Evento</h2>

    <label>Pacote:</label>

    <select id="pacote">
      <option value="50">Standard</option>
      <option value="80">Premium</option>
      <option value="120">Infinity Deluxe</option>
    </select>

    <label>Quantidade de Pessoas:</label>

    <input type="number" id="pessoas">

    <button onclick="calcular()">
      Calcular Orçamento
    </button>

    <div class="resultado">
      <p id="bruto"></p>
      <p id="taxa"></p>
      <p id="desconto"></p>
      <p id="total"></p>
    </div>

  </div>

  <script>

    function calcular(){

      let pacote = Number(document.getElementById("pacote").value);

      let pessoas = Number(document.getElementById("pessoas").value);

      let valorBruto = pacote * pessoas;

      let taxaServico = valorBruto * 0.10;

      let subtotal = valorBruto + taxaServico;

      let desconto = 0;

      if(pessoas > 100){
        desconto = subtotal * 0.05;
      }

      let totalFinal = subtotal - desconto;

      document.getElementById("bruto").innerHTML =
      "Custo Bruto: R$ " + valorBruto.toFixed(2);

      document.getElementById("taxa").innerHTML =
      "Taxa de Serviço: R$ " + taxaServico.toFixed(2);

      document.getElementById("desconto").innerHTML =
      "Desconto: R$ " + desconto.toFixed(2);

      document.getElementById("total").innerHTML =
      "Total Final: R$ " + totalFinal.toFixed(2);

    }

  </script>

</body>
</html>
